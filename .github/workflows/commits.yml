name: Auto Commit

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Commit and push
        run: |
          for i in $(seq 1 500); do
            git commit --allow-empty -m "Job1 $i"
          done
          git push

  commit-2:
    runs-on: ubuntu-latest
    needs: commit-1
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Commit and push
        run: |
          for i in $(seq 1 500); do
            git commit --allow-empty -m "Job2 $i"
          done
          git push

  commit-3:
    runs-on: ubuntu-latest
    needs: commit-2
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Commit and push
        run: |
          for i in $(seq 1 500); do
            git commit --allow-empty -m "Job3 $i"
          done
          git push
